server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${CONTEXT_PATH:/api/v1}

spring:
  application:
    name: docufise
  
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/BD_DOCUFISE_DEV?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false

  jackson:
    serialization:
      fail-on-empty-beans: false
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET:docufise-secret-key-2026-fise-project-springboot-jwt-authentication-secure-key-min-512-bits}
  expiration: ${JWT_EXPIRATION:86400000}

file:
  storage:
    type: ${STORAGE_TYPE:local}
    base-path: ${STORAGE_BASE_PATH:uploads}
    allowed-extensions: pdf,doc,docx,xls,xlsx,png,jpg,jpeg
    max-size: 52428800
    sftp:
      host: ${SFTP_HOST:localhost}
      port: ${SFTP_PORT:22}
      username: ${SFTP_USER:docufise}
      password: ${SFTP_PASS:""}
      remote-path: ${SFTP_REMOTE_PATH:/uploads/docufise}
    s3:
      bucket: ${S3_BUCKET:docufise-bucket}
      region: ${S3_REGION:us-east-1}
      access-key: ${S3_ACCESS_KEY:""}
      secret-key: ${S3_SECRET_KEY:""}

security:
  login:
    max-attempts: ${MAX_LOGIN_ATTEMPTS:3}
    lockout-minutes: ${LOCKOUT_MINUTES:15}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    try-it-out-enabled: true
    filter: true
    show-auth-extensions: true

logging:
  level:
    com.fise.docufise: ${LOGGING_LEVEL:DEBUG}
    org.springframework.security: INFO
