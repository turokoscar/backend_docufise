server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: docufise
  
  datasource:
    url: jdbc:mysql://localhost:3306/BD_DOCUFISE_DEV?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false

  jackson:
    serialization:
      fail-on-empty-beans: false
    default-property-inclusion: non_null

jwt:
  secret: docufise-secret-key-2026-fise-project-springboot-jwt-authentication-secure-key-min-512-bits
  expiration: 86400000

file:
  storage:
    type: local  # local, sftp, s3
    base-path: uploads
    allowed-extensions: pdf,doc,docx,xls,xlsx,png,jpg,jpeg
    max-size: 52428800  # 50MB en bytes
    # Configuración para SFTP (si type=sftp)
    sftp:
      host: localhost
      port: 22
      username: docufise
      password: ""
      remote-path: /uploads/docufise
      private-key-path: ""
    # Configuración para AWS S3 (si type=s3)
    s3:
      bucket: docufise-bucket
      region: us-east-1
      access-key: ""
      secret-key: ""
      endpoint: ""

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    try-it-out-enabled: true
    filter: true
    show-auth-extensions: true

logging:
  level:
    com.fise.docufise: DEBUG
    org.springframework.security: INFO
