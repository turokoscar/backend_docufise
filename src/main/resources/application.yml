server:
  port: 8080

spring:
  application:
    name: docufise
  
  datasource:
    url: jdbc:mysql://localhost:3306/BD_DOCUFISE_DEV?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

jwt:
  secret: docufise-secret-key-2026-fise-project-springboot-jwt-auth
  expiration: 86400000  # 24 horas en milisegundos

file:
  upload-dir: ./uploads
  
logging:
  level:
    com.fise.docufise: DEBUG
    org.springframework.security: INFO
